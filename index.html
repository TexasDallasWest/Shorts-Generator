<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shorts Automator</title>
    <style>
        :root { --green: #00ff88; --dark: #0a0a0a; }
        body { font-family: system-ui, sans-serif; background: var(--dark); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #141414; padding: 30px; border-radius: 12px; width: 400px; border: 1px solid #333; text-align: center; }
        h2 { color: var(--green); margin-top: 0; }
        .group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: 700; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #444; background: #1f1f1f; color: #fff; box-sizing: border-box; }
        button { background: var(--green); color: #000; font-weight: 800; border: none; cursor: pointer; }
        button:disabled { opacity: 0.15; cursor: not-allowed; }
        #log { margin-top: 15px; font-size: 0.75rem; color: var(--green); height: 120px; overflow-y: auto; background: #000; padding: 10px; border-radius: 6px; text-align: left; font-family: monospace; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h2>Shorts Automator</h2>
    <div class="group"><label>1. Video</label><input type="file" id="vIn" accept="video/*"></div>
    <div class="group"><label>2. Background Music</label><input type="file" id="mIn" accept="audio/mpeg"></div>
    <button id="runBtn" disabled>Loading Engine...</button>
    <div id="log">Initializing AI Logic...</div>
    <video id="preview" style="display:none" muted></video>
</div>

<!-- 1. The Video Engine Library -->
<!-- 1. The Video Engine Library -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<!-- 2. Your Security Permit -->
<script src="coi-serviceworker.js"></script>

<!-- 3. The Engine Logic -->
<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
        log: true, 
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' 
    });

    async function init() {
        try {
            console.log("Starting Engine...");
            await ffmpeg.load();
            
            // This finds your button and turns it on
            const btn = document.getElementById('runBtn');
            if(btn) {
                btn.disabled = false;
                btn.innerText = "Generate Short";
            }
            console.log("Engine Loaded and Ready!");
        } catch (e) { 
            console.error("Initialization Error:", e); 
        }
    }
    
    // This tells the browser to run the "init" function as soon as the page loads
    window.onload = init;
</script>
</body>
</html>
